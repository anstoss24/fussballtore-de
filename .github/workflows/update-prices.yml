name: Update Prices

on:
  schedule:
    - cron: '0 5 * * *'  # Daily at 05:00 UTC (06:00 CET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch prices from anstoss24.de
        run: node scripts/fetch-prices.mjs

      - name: Commit and push if changed
        run: |
          git diff --quiet src/data/prices.json && echo "No price changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/prices.json
          git commit -m "Preise automatisch aktualisiert ($(date +%Y-%m-%d))"
          git push
